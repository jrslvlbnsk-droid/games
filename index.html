<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zub Chytač 🦷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8f4fd;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    touch-action: none;
    user-select: none;
  }

  #bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #cdeeff 0%, #e8f9ff 40%, #f0fff4 100%);
    z-index: 0;
  }

  /* Bubbles BG */
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.8); opacity: 0.1; }
    100% { transform: translateY(-120px) scale(1.1); opacity: 0; }
  }

  #gameCanvas {
    position: relative;
    z-index: 1;
    display: block;
    margin: 0 auto;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(100,200,255,0.3);
  }

  #scoreDisplay {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(22px, 5vw, 32px);
    color: #1a8fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  }

  #livesDisplay {
    font-size: clamp(20px, 5vw, 30px);
    letter-spacing: 3px;
  }

  #levelDisplay {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(14px, 3vw, 20px);
    color: #888;
  }

  /* Overlay screens */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(220,240,255,0.92);
    backdrop-filter: blur(10px);
    padding: 20px;
    text-align: center;
  }

  .screen h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(40px, 10vw, 80px);
    color: #1a8fff;
    text-shadow: 3px 3px 0 rgba(0,100,200,0.15);
    line-height: 1;
    margin-bottom: 10px;
  }

  .screen .emoji-big {
    font-size: clamp(60px, 15vw, 100px);
    animation: bounce 1s ease-in-out infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-15px); }
  }

  .screen p {
    font-size: clamp(14px, 3.5vw, 20px);
    color: #445;
    margin: 12px 0;
    max-width: 380px;
    line-height: 1.5;
  }

  .btn {
    margin-top: 20px;
    padding: 16px 48px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(20px, 5vw, 28px);
    color: white;
    background: linear-gradient(135deg, #1a8fff, #0af);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(26,143,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(26,143,255,0.3); }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .legend-item {
    background: white;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: clamp(12px, 3vw, 15px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .good { border-left: 4px solid #00c853; }
  .bad  { border-left: 4px solid #ff1744; }

  #finalScore {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 7vw, 48px);
    color: #1a8fff;
    margin: 8px 0;
  }
</style>
</head>
<body>

<div id="bg"></div>

<!-- Start Screen -->
<div class="screen" id="startScreen">
  <div class="emoji-big">🦷</div>
  <h1>Zub Chytač</h1>
  <p>Chytej zubní pasty a sbírej body!<br>Vyhýbej se škodlivým dobrotám!</p>
  <div class="legend">
    <div class="legend-item good">🪥 Zubní pasta → +1</div>
    <div class="legend-item bad">🥤 Coca-Cola → −1 ❤️</div>
    <div class="legend-item bad">🍩 Donut → −1 ❤️</div>
    <div class="legend-item bad">🍫 Čokoláda → −1 ❤️</div>
  </div>
  <button class="btn" onclick="startGame()">Hrát! 🎮</button>
</div>

<!-- Game Over Screen -->
<div class="screen" id="gameoverScreen" style="display:none">
  <div class="emoji-big">😬</div>
  <h1>Konec!</h1>
  <div id="finalScore">0 bodů</div>
  <p id="finalMsg"></p>
  <button class="btn" onclick="startGame()">Hrát znovu 🔄</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="scoreDisplay">⭐ 0</div>
  <div id="livesDisplay">❤️❤️❤️</div>
  <div id="levelDisplay">Level 1</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
let gameRunning = false;
let score = 0;
let lives = 3;
let level = 1;
let frameCount = 0;
let spawnInterval = 80;
let items = [];
let particles = [];
let toothX = 0;
let toothY = 0;
let toothW = 80;
let toothH = 80;
let baseSpeed = 2.5;
let animId;
let hitFlash = 0;

const EMOJIS = {
  good: [{ e: '🪥', label: 'pasta' }],
  bad:  [
    { e: '🥤', label: 'cola' },
    { e: '🍩', label: 'donut' },
    { e: '🍫', label: 'cokolada' }
  ]
};

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  toothX = W / 2;
  toothY = H - 90;
  toothW = Math.min(80, W * 0.15);
  toothH = toothW;
}
window.addEventListener('resize', resize);
resize();

// Input
let targetX = null;

window.addEventListener('mousemove', e => {
  if (gameRunning) targetX = e.clientX;
});

window.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameRunning) targetX = e.touches[0].clientX;
}, { passive: false });

window.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameRunning) targetX = e.touches[0].clientX;
}, { passive: false });

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameoverScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  score = 0; lives = 3; level = 1; frameCount = 0;
  spawnInterval = 80; baseSpeed = 2.5;
  items = []; particles = [];
  toothX = W / 2; targetX = W / 2;
  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function endGame() {
  gameRunning = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('gameoverScreen').style.display = 'flex';
  document.getElementById('finalScore').textContent = score + ' bodů';
  const msgs = [
    score < 5  ? '😅 Zkus to znovu, příště to půjde lépe!' : '',
    score < 15 ? '👍 Dobrý začátek! Trénuj dál.' : '',
    score < 30 ? '😎 Solidní výkon! Jsi pravý zubní hygienik.' : '',
    score >= 30 ? '🏆 Neuvěřitelné! Tvůj zub je nezastavitelný!' : '',
  ].filter(Boolean);
  document.getElementById('finalMsg').textContent = msgs[msgs.length-1] || '';
}

function spawnItem() {
  const isGood = Math.random() < 0.45;
  const pool = isGood ? EMOJIS.good : EMOJIS.bad;
  const def = pool[Math.floor(Math.random() * pool.length)];
  const size = toothW * 0.85 + Math.random() * 10;
  items.push({
    x: size/2 + Math.random() * (W - size),
    y: -size,
    size,
    speed: baseSpeed + Math.random() * 1.5,
    emoji: def.e,
    good: isGood,
    spin: (Math.random()-0.5) * 0.05
  });
}

function spawnParticles(x, y, good) {
  const colors = good
    ? ['#00e676','#69ff47','#ffffff','#b9ffcd']
    : ['#ff1744','#ff616f','#ffffff','#ffd3d7'];
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.04 + Math.random() * 0.03,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function drawTooth(x, y, w, h) {
  const cx = x;
  const cy = y;
  const hw = w * 0.5;
  const hh = h * 0.5;

  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.shadowColor = 'rgba(0,100,200,0.2)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 5;

  // Body
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  // Top bumps (cusps)
  const bumpR = hw * 0.38;
  ctx.arc(-hw*0.32, -hh*0.25, bumpR, Math.PI, 0); // left cusp
  ctx.arc(hw*0.32, -hh*0.25, bumpR, Math.PI, 0);  // right cusp
  // Body sides down to roots
  ctx.lineTo(hw*0.55, hh*0.3);
  // Root left
  ctx.quadraticCurveTo(hw*0.4, hh*0.9, hw*0.15, hh*0.95);
  ctx.quadraticCurveTo(0, hh*1.0, -hw*0.15, hh*0.95);
  ctx.quadraticCurveTo(-hw*0.4, hh*0.9, -hw*0.55, hh*0.3);
  ctx.closePath();
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // Outline
  ctx.strokeStyle = '#c8e6ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Shine lines
  ctx.strokeStyle = 'rgba(180,230,255,0.6)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-hw*0.2, -hh*0.5);
  ctx.lineTo(-hw*0.1, hh*0.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hw*0.05, -hh*0.45);
  ctx.lineTo(hw*0.12, 0);
  ctx.stroke();

  ctx.restore();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = '⭐ ' + score;
  document.getElementById('livesDisplay').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('levelDisplay').textContent = 'Level ' + level;
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  frameCount++;

  // Level up
  const newLevel = Math.floor(score / 8) + 1;
  if (newLevel !== level) {
    level = newLevel;
    spawnInterval = Math.max(28, 80 - level * 8);
    baseSpeed = 2.5 + level * 0.5;
  }

  // Spawn
  if (frameCount % spawnInterval === 0) spawnItem();

  // Move tooth toward target
  if (targetX !== null) {
    const dx = targetX - toothX;
    toothX += dx * 0.18;
  }
  toothX = Math.max(toothW/2, Math.min(W - toothW/2, toothX));

  // Hit flash BG
  if (hitFlash > 0) {
    ctx.fillStyle = `rgba(255,50,50,${hitFlash * 0.25})`;
    ctx.fillRect(0, 0, W, H);
    hitFlash -= 0.08;
  }

  // Draw items
  const toRemove = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    it.y += it.speed;
    it.spin = it.spin || 0;

    ctx.save();
    ctx.translate(it.x, it.y);
    if (it.spin) ctx.rotate(it.spin * frameCount);
    ctx.font = it.size + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(it.emoji, 0, 0);
    ctx.restore();

    // Collision with tooth
    const dx = Math.abs(it.x - toothX);
    const dy = Math.abs(it.y - toothY);
    const catchR = (toothW * 0.55 + it.size * 0.35);
    if (dx < catchR && dy < catchR) {
      spawnParticles(it.x, it.y, it.good);
      if (it.good) {
        score++;
      } else {
        lives--;
        hitFlash = 1;
        if (lives <= 0) {
          toRemove.push(i);
          updateHUD();
          // draw one more frame then end
          drawTooth(toothX, toothY, toothW, toothH);
          items.splice(0);
          endGame();
          return;
        }
      }
      updateHUD();
      toRemove.push(i);
      continue;
    }

    // Off screen
    if (it.y > H + it.size) {
      toRemove.push(i);
    }
  }

  // Remove collected/missed items (reverse to not mess indices)
  for (let i = toRemove.length - 1; i >= 0; i--) {
    items.splice(toRemove[i], 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw tooth
  drawTooth(toothX, toothY, toothW, toothH);

  if (gameRunning) animId = requestAnimationFrame(loop);
}

// Draw static tooth on start screen behind overlay
resize();
ctx.clearRect(0, 0, W, H);
drawTooth(W/2, H/2 + 60, 90, 90);
</script>
</body>
</html>
